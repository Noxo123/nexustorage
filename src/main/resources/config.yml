# ═══════════════════════════════════════════════════════════════════════════
# Configuration NexusStorage v2.0 - Système de stockage interconnecté premium
# ═══════════════════════════════════════════════════════════════════════════

# Active/désactive les intégrations externes (aussi modifiable en jeu via /nexusadmin toggle)
integrations:
  vault:
    enabled: true
  itemsadder:
    enabled: false
  placeholderapi:
    enabled: true

# ═══════════════════════════════════════════════════════════════════════════
# ÉCONOMIE
# ═══════════════════════════════════════════════════════════════════════════
economy:
  cost-open-tablet: 0.0
  cost-change-page: 0.0
  cost-add-member: 50.0

# ═══════════════════════════════════════════════════════════════════════════
# UPGRADES DE RÉSEAU (augmente les pages de stockage)
# ═══════════════════════════════════════════════════════════════════════════
upgrades:
  tier1:
    pages: 3
    cost: 0.0
  tier2:
    pages: 10
    cost: 5000.0
  tier3:
    pages: 50
    cost: 20000.0
  tier4:
    pages: 200
    cost: 75000.0
  tier5:
    pages: 1000
    cost: 250000.0

# ═══════════════════════════════════════════════════════════════════════════
# SYSTÈME D'ÉNERGIE
# ═══════════════════════════════════════════════════════════════════════════
energy:
  # Duree d'un cycle de simulation du réseau d'énergie, en ticks serveur (20 = 1 seconde)
  tick-interval: 20
  
  # Prix de base de l'électricité vendue (prix par unité d'énergie)
  # Le joueur peut ajuster ce prix via la GUI
  base-energy-price: 0.1
  
  solar_panel_basic:
    production: 20
  solar_panel_advanced:
    production: 60
    min-y: 100
  capacitor_basic:
    capacity: 10000
  capacitor_advanced:
    capacity: 100000
  cable_basic:
    loss-per-block: 0.02
    max-length: 256
  cable_insulated:
    loss-per-block: 0.005
    max-length: 512
  interface_block:
    energy-per-item: 5
  regulator:
    default-threshold: 20

# ═══════════════════════════════════════════════════════════════════════════
# NEXUS CHEST LINK (connecte un coffre au stockage virtuel)
# ═══════════════════════════════════════════════════════════════════════════
chest-link:
  tick-interval: 20
  base-items-per-cycle: 1
  items-per-upgrade-level: 1
  max-upgrade-level: 3

# ═══════════════════════════════════════════════════════════════════════════
# BLOCS NEXUS (accès au stockage - WiFi et Normal)
# ═══════════════════════════════════════════════════════════════════════════
nexus-blocks:
  # Bloc Nexus Normal - vanilla
  normal:
    material: "AMETHYST_BLOCK"
    # ItemsAdder : "custom:nexus_block_normal" (laissez vide pour vanilla)
    itemsadder: ""
  
  # Bloc Nexus WiFi - vanilla
  wifi:
    material: "LIGHTNING_ROD"
    # ItemsAdder : "custom:nexus_block_wifi" (laissez vide pour vanilla)
    itemsadder: ""

# ═══════════════════════════════════════════════════════════════════════════
# INTERFACE GUI (personnalisable)
# ═══════════════════════════════════════════════════════════════════════════
gui:
  # Thème : 'default', 'dark', 'forest', 'ocean' (custom themes via config)
  theme: "default"
  
  # Taille de la barre de recherche (max 20 caractères)
  search-bar-length: 20
  
  # Position du bouton "Déposer tous les items"
  # Positions: "top-left", "top-right", "bottom-left", "bottom-right"
  deposit-button-position: "top-right"
  
  # Afficher le livre avec numéro de page
  show-page-book: true

# ═══════════════════════════════════════════════════════════════════════════
# SYSTÈME D'ENTREPRISES
# ═══════════════════════════════════════════════════════════════════════════
companies:
  # Coût de création d'une entreprise (très élevé pour préserver l'économie)
  creation-cost: 50000.0
  
  # Coût mensuel de maintenance d'une entreprise
  monthly-maintenance-cost: 5000.0
  
  # Nombre maximum de membres par entreprise (-1 = illimité)
  max-members: 50
  
  # L'invitation doit être acceptée avant de rejoindre le réseau
  require-invitation-acceptance: true
  
  # Durée de validité d'une invitation en heures (0 = illimitée)
  invitation-expiry-hours: 72

