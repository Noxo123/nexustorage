# ═══════════════════════════════════════════════════════════════════════════
# Configuration NexusStorage v2.0
# ═══════════════════════════════════════════════════════════════════════════

integrations:
  vault:
    enabled: true
  itemsadder:
    enabled: false
  placeholderapi:
    enabled: true

# ═══════════════════════════════════════════════════════════════════════════
# ÉCONOMIE
# ═══════════════════════════════════════════════════════════════════════════
economy:
  cost-open-tablet: 0.0
  cost-change-page: 0.0
  cost-add-member: 50.0

# ═══════════════════════════════════════════════════════════════════════════
# UPGRADES
# ═══════════════════════════════════════════════════════════════════════════
upgrades:
  tier1:
    pages: 3
    cost: 0.0
  tier2:
    pages: 10
    cost: 5000.0
  tier3:
    pages: 50
    cost: 20000.0
  tier4:
    pages: 200
    cost: 75000.0
  tier5:
    pages: 1000
    cost: 250000.0

# ═══════════════════════════════════════════════════════════════════════════
# ÉNERGIE
# ═══════════════════════════════════════════════════════════════════════════
energy:
  tick-interval: 20
  base-energy-price: 0.1
  solar_panel_basic:
    production: 20
  solar_panel_advanced:
    production: 60
    min-y: 100
  capacitor_basic:
    capacity: 10000
  capacitor_advanced:
    capacity: 100000
  cable_basic:
    loss-per-block: 0.02
    max-length: 256
  cable_insulated:
    loss-per-block: 0.005
    max-length: 512
  interface_block:
    energy-per-item: 5
  regulator:
    default-threshold: 20
  electric_furnace:
    energy-per-tick: 75.0

# ═══════════════════════════════════════════════════════════════════════════
# CHEST LINK
# ═══════════════════════════════════════════════════════════════════════════
chest-link:
  tick-interval: 20
  base-items-per-cycle: 1
  items-per-upgrade-level: 1
  max-upgrade-level: 3

# ═══════════════════════════════════════════════════════════════════════════
# BLOCS NEXUS (clic droit = ouvre stockage)
# Laissez itemsadder vide pour utiliser le bloc vanilla
# ═══════════════════════════════════════════════════════════════════════════
nexus-blocks:
  normal:
    material: "AMETHYST_BLOCK"
    itemsadder: ""
  wifi:
    material: "LIGHTNING_ROD"
    itemsadder: ""

# ═══════════════════════════════════════════════════════════════════════════
# ENTREPRISES
# ═══════════════════════════════════════════════════════════════════════════
companies:
  creation-cost: 50000.0
  max-members: 50
  require-invitation-acceptance: true
  invitation-expiry-hours: 72

