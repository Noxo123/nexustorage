# ═══════════════════════════════════════════════════════════════════════════
# NexusStorage v2.0 — Configuration ItemsAdder
# ═══════════════════════════════════════════════════════════════════════════
#
# Pour chaque objet, tu peux définir :
#   itemsadder: "namespace:id"   → utilise cet item ItemsAdder
#   itemsadder: "default"        → utilise le Material vanilla défini ci-dessous
#
# Si ItemsAdder n'est pas installé ou si la valeur est "default",
# le plugin utilise automatiquement le material vanilla de fallback.
#
# Exemple :
#   nexus-core:
#     itemsadder: "nexus:nexus_core"
#     fallback: "LODESTONE"
# ═══════════════════════════════════════════════════════════════════════════

# ── Items donnables (/nexus give ...) ─────────────────────────────────────

nexus-core:
  itemsadder: "default"
  fallback: "LODESTONE"

nexus-tablet:
