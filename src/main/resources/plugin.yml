name: NexusStorage
main: com.novusmc.nexusstorage.Main
version: 1.0
api-version: '1.21'
author: NovusMC
description: Systeme de stockage interconnecte SMP premium.
softdepend: [Vault]

commands:
  nexus:
    description: Commande principale de NexusStorage
    usage: /nexus [give|upgrade|access]
    permission: nexusstorage.use
    permission-message: "Tu n'as pas la permission d'utiliser NexusStorage."
  nexusadmin:
    description: Commandes d'administration de NexusStorage
    usage: /nexusadmin [gui|reload|toggle|network|give]
    permission: nexusstorage.admin
    permission-message: "Tu n'as pas la permission d'utiliser les commandes admin NexusStorage."

permissions:
  nexusstorage.use:
    default: true
  nexusstorage.admin:
    default: op
